# ============================================================
# Mesa Lúdica - Configuración de Nginx para la SPA Angular
# Sirve los archivos estáticos y redirige las rutas al index.html.
# ============================================================
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Fallback de SPA: las rutas de Angular (/catalogo-api, /detalle/:id,
  # /mis-compras, etc.) no existen como archivos en disco. Si la ruta no
  # coincide con un archivo, se sirve index.html y Angular resuelve el enrutado.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
