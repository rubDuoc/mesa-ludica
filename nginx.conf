# ============================================================
# Mesa Lúdica - Configuración de Nginx para la SPA Angular
# Sirve los archivos estáticos y redirige las rutas al index.html.
#
# Se usa como plantilla: el contenedor sustituye ${PORT} por el puerto
# que asigne el entorno (80 en local, o el que defina el Cloud), de modo
# que la imagen sirve tanto para local como para el despliegue en la nube.
# ============================================================
server {
  listen ${PORT};
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Fallback de SPA: las rutas de Angular (/categoria/..., /mis-compras, etc.)
  # no existen como archivos en disco. Si la ruta no coincide con un archivo,
  # se sirve index.html y Angular resuelve el enrutado.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
